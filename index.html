<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Craft World - AIクラフトワールド</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      overflow: hidden;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      cursor: crosshair;
    }

    #game-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      color: #fff;
      z-index: 100;
      transition: opacity 0.5s;
    }

    #loading h1 {
      font-size: 2.5em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #42A5F5, #EC407A);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #loading p {
      color: #888;
      font-size: 1.1em;
      margin-bottom: 24px;
    }

    #loading .subtitle {
      color: #666;
      font-size: 0.9em;
      margin-top: 16px;
    }

    .loading-bar {
      width: 300px;
      height: 4px;
      background: #333;
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #42A5F5, #EC407A);
      animation: loading 1.5s ease-in-out infinite;
      width: 40%;
      border-radius: 2px;
    }

    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    #controls-overlay {
      position: fixed;
      top: 50%;
      right: 16px;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.6);
      color: #aaa;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 11px;
      line-height: 1.8;
      pointer-events: none;
      opacity: 0.8;
    }

    #controls-overlay kbd {
      background: rgba(255,255,255,0.15);
      padding: 1px 5px;
      border-radius: 3px;
      font-family: monospace;
      color: #ddd;
    }
  </style>
</head>
<body>
  <div id="loading">
    <h1>AI Craft World</h1>
    <p>話しかけるだけで仲間が働くクラフトゲーム</p>
    <div class="loading-bar">
      <div class="loading-bar-fill"></div>
    </div>
    <p class="subtitle">Generating world...</p>
  </div>

  <canvas id="game-canvas"></canvas>

  <div id="controls-overlay">
    <kbd>WASD</kbd> 移動<br>
    <kbd>Space</kbd> 採掘/攻撃<br>
    <kbd>Q</kbd> ブロック設置<br>
    <kbd>E</kbd> 食べる/寝る<br>
    <kbd>C</kbd> クラフト<br>
    <kbd>1-0</kbd> アイテム選択<br>
    <kbd>Enter</kbd> AI相棒に話す<br>
  </div>

  <script type="module">
    import { Game } from './src/game.js';

    window.addEventListener('load', () => {
      const canvas = document.getElementById('game-canvas');
      const loading = document.getElementById('loading');

      // Small delay to show loading screen
      setTimeout(() => {
        const game = new Game(canvas);
        game.start();

        // Fade out loading screen
        loading.style.opacity = '0';
        setTimeout(() => {
          loading.style.display = 'none';
        }, 500);

        // Fade out controls after 15 seconds
        setTimeout(() => {
          const controls = document.getElementById('controls-overlay');
          controls.style.transition = 'opacity 2s';
          controls.style.opacity = '0';
          setTimeout(() => controls.style.display = 'none', 2000);
        }, 15000);

        // Expose for debugging
        window.game = game;
      }, 800);
    });
  </script>
</body>
</html>
