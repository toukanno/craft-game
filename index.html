<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browser Minecraft Clone</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: #87ceeb; font-family: system-ui, sans-serif; }
    #game { width: 100vw; height: 100vh; display: block; }
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: #fff;
      text-shadow: 0 2px 3px rgba(0, 0, 0, 0.7);
    }
    #crosshair {
      position: absolute;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 22px; font-weight: bold;
    }
    #help {
      position: absolute;
      top: 12px; left: 12px;
      background: rgba(0,0,0,0.45);
      padding: 10px 12px;
      border-radius: 8px;
      line-height: 1.5;
      font-size: 14px;
    }
    #hotbar {
      position: absolute;
      left: 50%; bottom: 20px; transform: translateX(-50%);
      display: flex; gap: 8px;
    }
    .slot {
      width: 44px; height: 44px;
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 8px;
      background: rgba(0,0,0,0.35);
      display: grid; place-items: center;
      font-size: 12px;
    }
    .slot.active { border-color: #ffd54f; background: rgba(255, 213, 79, 0.2); }
    #overlay {
      position: fixed; inset: 0; display: grid; place-items: center;
      background: rgba(0,0,0,0.65); color: #fff;
      text-align: center; cursor: pointer;
    }
    #overlay .box {
      background: rgba(25,25,25,0.9);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 24px 30px;
      max-width: 520px;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="hud">
    <div id="crosshair">+</div>
    <div id="help">
      <div><b>操作</b></div>
      <div>WASD: 移動 / Space: ジャンプ / Shift: 下降</div>
      <div>左クリック: ブロック破壊 / 右クリック: ブロック設置</div>
      <div>1-5: ブロック切替</div>
    </div>
    <div id="hotbar"></div>
  </div>

  <div id="overlay">
    <div class="box">
      <h1>ブラウザ版 Minecraft 風</h1>
      <p style="margin-top: 10px; opacity: 0.9;">クリックして開始（マウス視点を有効化）</p>
    </div>
  </div>

  <script type="module" src="./src/minecraft.js"></script>
</body>
</html>
