<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Craft World 3D - ブラウザ版マインクラフト</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #87CEEB;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      color: #fff;
      user-select: none;
    }

    #game-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    /* ---------- Crosshair ---------- */
    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 22px;
      height: 22px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 5;
      mix-blend-mode: difference;
    }
    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: #fff;
    }
    #crosshair::before {
      top: 50%; left: 0;
      width: 100%; height: 2px;
      transform: translateY(-50%);
    }
    #crosshair::after {
      left: 50%; top: 0;
      width: 2px; height: 100%;
      transform: translateX(-50%);
    }

    /* ---------- Hotbar ---------- */
    #hotbar {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      padding: 4px;
      background: rgba(0, 0, 0, 0.45);
      border: 2px solid rgba(0, 0, 0, 0.7);
      border-radius: 6px;
      z-index: 10;
    }
    .hotbar-slot {
      width: 52px;
      height: 52px;
      background: rgba(120, 120, 120, 0.55);
      border: 2px solid rgba(0, 0, 0, 0.6);
      border-radius: 4px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
    }
    .hotbar-slot.active {
      border-color: #fff;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.4) inset;
    }
    .hotbar-slot .slot-num {
      position: absolute;
      top: 2px;
      left: 4px;
      font-size: 10px;
      color: #fff;
      text-shadow: 1px 1px 0 #000;
      pointer-events: none;
    }
    .hotbar-slot .slot-name {
      position: absolute;
      bottom: 2px;
      left: 0; right: 0;
      font-size: 9px;
      color: #fff;
      text-shadow: 1px 1px 0 #000;
      pointer-events: none;
    }
    .hotbar-slot .slot-icon {
      width: 32px;
      height: 32px;
      image-rendering: pixelated;
      pointer-events: none;
    }

    /* ---------- HUD ---------- */
    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      font-size: 12px;
      line-height: 1.5;
      background: rgba(0,0,0,0.4);
      padding: 8px 12px;
      border-radius: 4px;
      z-index: 10;
      font-family: monospace;
      white-space: pre;
    }

    /* ---------- Start screen ---------- */
    #start-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #87CEEB 0%, #4a7ab8 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.4s;
    }
    #start-screen h1 {
      font-size: 3.2em;
      margin-bottom: 8px;
      color: #fff;
      text-shadow: 3px 3px 0 #2a3a5a, 6px 6px 0 rgba(0,0,0,0.3);
      letter-spacing: 2px;
    }
    #start-screen .sub {
      color: #fff;
      font-size: 1.1em;
      margin-bottom: 32px;
      opacity: 0.9;
    }
    #start-button {
      padding: 14px 36px;
      font-size: 1.1em;
      background: #5e8e3e;
      color: #fff;
      border: 3px solid #2a3a5a;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 0 #2a3a5a;
      transition: transform 0.1s;
    }
    #start-button:hover { background: #6fa54a; }
    #start-button:active { transform: translateY(2px); box-shadow: 0 2px 0 #2a3a5a; }

    #controls-list {
      margin-top: 28px;
      background: rgba(0,0,0,0.35);
      padding: 16px 24px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.9;
      color: #fff;
    }
    #controls-list kbd {
      background: rgba(255,255,255,0.2);
      padding: 1px 7px;
      border-radius: 3px;
      font-family: monospace;
      border: 1px solid rgba(255,255,255,0.4);
      margin: 0 2px;
    }

    /* ---------- Pause overlay ---------- */
    #pause-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 50;
      color: #fff;
      text-align: center;
    }
    #pause-overlay.show { display: flex; }
    #pause-overlay h2 { font-size: 2em; margin-bottom: 8px; }
    #pause-overlay p { opacity: 0.85; }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <div id="crosshair"></div>

  <div id="hud">Loading...</div>

  <div id="hotbar"></div>

  <div id="pause-overlay">
    <h2>一時停止</h2>
    <p>クリックでゲームに戻る</p>
  </div>

  <div id="start-screen">
    <h1>CRAFT WORLD 3D</h1>
    <div class="sub">ブラウザで遊べる3Dクラフトゲーム</div>
    <button id="start-button">ゲームを始める</button>
    <div id="controls-list">
      <div><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 移動 &nbsp;・&nbsp; <kbd>Space</kbd> ジャンプ &nbsp;・&nbsp; <kbd>Shift</kbd> ダッシュ</div>
      <div><kbd>マウス</kbd> 視点 &nbsp;・&nbsp; <kbd>左クリック</kbd> ブロックを壊す &nbsp;・&nbsp; <kbd>右クリック</kbd> ブロックを置く</div>
      <div><kbd>1</kbd>〜<kbd>8</kbd> アイテム選択 &nbsp;・&nbsp; <kbd>ホイール</kbd> 切替 &nbsp;・&nbsp; <kbd>ESC</kbd> 一時停止</div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import { Game } from './src/main.js';

    const canvas = document.getElementById('game-canvas');
    const startScreen = document.getElementById('start-screen');
    const startButton = document.getElementById('start-button');

    const game = new Game(canvas);
    game.init();

    startButton.addEventListener('click', () => {
      startScreen.style.opacity = '0';
      setTimeout(() => { startScreen.style.display = 'none'; }, 400);
      game.start();
    });

    window.game = game;
  </script>
</body>
</html>
